version: '3.8'

services:
  api:
    build: .
    ports:
      - "9000:9000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
    env_file:
      - .env
    volumes:
      - ./:/app
      - /app/__pycache__
    command: uvicorn app.main:app --host 0.0.0.0 --port 9000 --reload

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Optional: PostgreSQL for additional data storage
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_USER: finance
  #     POSTGRES_PASSWORD: finance
  #     POSTGRES_DB: finance_tracker
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  # postgres_data: